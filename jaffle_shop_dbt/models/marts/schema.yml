version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension with lifetime order metrics.
      One row per customer. Used for customer segmentation and LTV reporting.
    columns:
      - name: customer_id
        description: 'Unique customer identifier (PK)'
        tests:
          - unique
          - not_null
      - name: first_name
        description: 'Customer first name'
      - name: last_name
        description: 'Customer last name'
      - name: first_order_date
        description: 'Date of the first order placed by this customer'
      - name: most_recent_order_date
        description: 'Date of the most recent order'
      - name: number_of_orders
        description: 'Total count of orders placed by this customer'
      - name: lifetime_value
        description: 'Total amount paid across all orders in dollars'

  - name: fct_orders
    description: >
      Order fact table. One row per order.
      Sourced from int_orders_with_payments.
    columns:
      - name: order_id
        description: 'Unique order identifier (PK)'
        tests:
          - unique
          - not_null
      - name: customer_id
        description: 'Customer identifier (FK to dim_customers)'
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_date
        description: 'Date the order was placed'
      - name: status
        description: 'Order fulfillment status'
      - name: total_amount
        description: 'Total payment amount in dollars'
